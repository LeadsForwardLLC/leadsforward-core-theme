name: Deploy Theme to SiteGround Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate PHP syntax
        run: |
          find . -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Configure SSH private key
        env:
          SG_SSH_PASSPHRASE: ${{ secrets.SG_SSH_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SG_SSH_KEY }}" > ~/.ssh/id_sg_deploy
          chmod 600 ~/.ssh/id_sg_deploy
          if [ -n "${SG_SSH_PASSPHRASE}" ]; then
            ssh-keygen -p -P "${SG_SSH_PASSPHRASE}" -N "" -f ~/.ssh/id_sg_deploy >/dev/null
          fi
          ssh-keygen -y -f ~/.ssh/id_sg_deploy >/dev/null

      - name: Trust SiteGround host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SG_PORT }}" -H "${{ secrets.SG_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify SSH authentication
        run: |
          ssh -i ~/.ssh/id_sg_deploy \
            -p "${{ secrets.SG_PORT }}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}" \
            "echo 'SSH auth OK'"

      - name: Deploy theme via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_sg_deploy -p ${{ secrets.SG_PORT }} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".cursor/" \
            --exclude "docs/" \
            --exclude "README.md" \
            ./ \
            "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:${{ secrets.SG_THEME_PATH }}/"
