name: Deploy Theme to SiteGround Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate PHP syntax
        run: |
          find . -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Configure SSH private key
        env:
          SG_SSH_PASSPHRASE: ${{ secrets.SG_SSH_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SG_SSH_KEY }}" > ~/.ssh/id_sg_deploy
          chmod 600 ~/.ssh/id_sg_deploy
          if [ -n "${SG_SSH_PASSPHRASE}" ]; then
            ssh-keygen -p -P "${SG_SSH_PASSPHRASE}" -N "" -f ~/.ssh/id_sg_deploy >/dev/null
          fi
          ssh-keygen -y -f ~/.ssh/id_sg_deploy >/dev/null

      # ssh-keyscan exits 1 if it cannot fetch keys (DNS, rate-limit, SG hiccup). Retries + optional pin.
      # If this step still fails, add repo secret SG_SSH_KNOWN_HOSTS with the output of:
      #   ssh-keyscan -p "$SG_PORT" -H "$SG_HOST"
      # (one or more lines), then re-run the workflow.
      - name: Trust SiteGround host key
        env:
          SG_SSH_KNOWN_HOSTS: ${{ secrets.SG_SSH_KNOWN_HOSTS }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          if [ -n "${SG_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${SG_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
            echo "Using SG_SSH_KNOWN_HOSTS (pinned host key lines)."
          else
            if [ -z "${{ secrets.SG_HOST }}" ] || [ -z "${{ secrets.SG_PORT }}" ]; then
              echo "::error::SG_HOST and SG_PORT repository secrets must be set for ssh-keyscan."
              exit 1
            fi
            ok=""
            for attempt in 1 2 3 4 5 6 7 8; do
              if ssh-keyscan -T 15 -p "${{ secrets.SG_PORT }}" -H "${{ secrets.SG_HOST }}" >> ~/.ssh/known_hosts 2>/tmp/lf-keyscan.log; then
                if [ -s ~/.ssh/known_hosts ]; then
                  ok="1"
                  echo "ssh-keyscan succeeded on attempt ${attempt}"
                  break
                fi
              fi
              echo "ssh-keyscan attempt ${attempt} failed; retrying in 5s..."
              cat /tmp/lf-keyscan.log || true
              : > ~/.ssh/known_hosts
              sleep 5
            done
            if [ -z "${ok}" ]; then
              echo "::error::ssh-keyscan could not populate known_hosts after retries."
              echo "Add repository secret SG_SSH_KNOWN_HOSTS with: ssh-keyscan -p PORT -H HOST"
              exit 1
            fi
          fi

      - name: Verify SSH authentication
        run: |
          ssh -i ~/.ssh/id_sg_deploy \
            -p "${{ secrets.SG_PORT }}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}" \
            "echo 'SSH auth OK'"

      - name: Deploy theme via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_sg_deploy -p ${{ secrets.SG_PORT }} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".cursor/" \
            --exclude "docs/" \
            --exclude "README.md" \
            ./ \
            "${{ secrets.SG_USER }}@${{ secrets.SG_HOST }}:${{ secrets.SG_THEME_PATH }}/"
